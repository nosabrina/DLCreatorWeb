  <div id="app"><div class="boot-message">Chargement de DL Creator Web…</div></div>
  <script>
    window.DL_CREATOR_BOOT = {
      indexLoaded: true,
      appJsLoaded: false,
      startedAt: new Date().toISOString(),
      ignoredExternalErrors: 0
    };

    function dlCreatorEscapeBootMessage(value){
      return String(value || '').replace(/[&<>]/g,function(c){
        return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];
      });
    }

    function dlCreatorIsExternalSafariNoise(event){
      var filename = String((event && event.filename) || '');
      var message = String((event && event.message) || '');
      if (filename.indexOf('webkit-masked-url://') === 0) return true;
      if (filename.indexOf('safari-extension://') === 0) return true;
      if (filename.indexOf('x-webkit-extension://') === 0) return true;
      if (filename.indexOf('moz-extension://') === 0) return true;
      if (filename.indexOf('chrome-extension://') === 0) return true;
      if (filename === '' && /webkit-masked-url|hidden/i.test(message)) return true;
      return false;
    }

    function dlCreatorRenderBootError(title, details){
      var app=document.getElementById('app');
      if(!app) return;
      app.innerHTML='<div class="container"><div class="card boot-error"><h1>Démarrage interrompu</h1><p>'+dlCreatorEscapeBootMessage(title)+'</p><pre>'+dlCreatorEscapeBootMessage(details)+'</pre></div></div>';
    }

    function dlCreatorReportRuntimeIssue(kind, details){
      try{ console.warn('[DL Creator Web][runtime]', kind, details); }catch(e){}
      try{ window.DLCreatorCore && window.DLCreatorCore.auditService && window.DLCreatorCore.auditService.write && window.DLCreatorCore.auditService.write('runtime-session-issue',{kind:kind, details:String(details||'').slice(0,500), afterBoot:!!window.DL_CREATOR_BOOT.appJsLoaded, visibility:document.visibilityState, destructive:false}, 'WARN'); }catch(e){}
      try{ window.actionStatus && window.actionStatus('Incident non bloquant détecté après reprise de session. Actualiser si l’interface ne répond plus.', 'warn'); }catch(e){}
    }

    window.addEventListener('error', function(event){
      if (dlCreatorIsExternalSafariNoise(event)) {
        window.DL_CREATOR_BOOT.ignoredExternalErrors += 1;
        return;
      }
      var msg=(event && (event.message || (event.error && event.error.message))) || 'Erreur JavaScript inconnue';
      var file=(event && event.filename) ? event.filename.split('/').pop() : 'fichier inconnu';
      var line=event && event.lineno ? ':'+event.lineno : '';
      var details=file+line+' — '+msg;
      if(window.DL_CREATOR_BOOT.appJsLoaded){
        dlCreatorReportRuntimeIssue('error-after-boot', details);
        return;
      }
      dlCreatorRenderBootError('Une erreur JavaScript empêche le chargement de DL Creator Web.', details);
    });

    window.addEventListener('unhandledrejection', function(event){
      var reason=event && event.reason ? (event.reason.stack || event.reason.message || event.reason) : 'Promesse rejetée';
      if (/webkit-masked-url|safari-extension|chrome-extension|moz-extension|x-webkit-extension/i.test(String(reason))) {
        window.DL_CREATOR_BOOT.ignoredExternalErrors += 1;
        return;
      }
      if(window.DL_CREATOR_BOOT.appJsLoaded){
        dlCreatorReportRuntimeIssue('rejection-after-boot', reason);
        return;
      }
      dlCreatorRenderBootError('Une promesse JavaScript a été rejetée pendant le chargement.', reason);
    });
  </script>
