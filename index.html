  <div id="app"><div class="boot-message">Chargement de DL Creator Web…</div></div>
  <script>
    window.DL_CREATOR_BOOT = { indexLoaded: true, appJsLoaded: false, startedAt: new Date().toISOString() };
    window.addEventListener('error', function(event){
      var app=document.getElementById('app');
      if(!app) return;
      var msg=(event && (event.message || (event.error && event.error.message))) || 'Erreur JavaScript inconnue';
      var file=(event && event.filename) ? event.filename.split('/').pop() : 'fichier inconnu';
      var line=event && event.lineno ? ':'+event.lineno : '';
      app.innerHTML='<div class="container"><div class="card boot-error"><h1>Démarrage interrompu</h1><p>Une erreur JavaScript empêche le chargement de DL Creator Web.</p><pre>'+String(file+line+' — '+msg).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];})+'</pre></div></div>';
    });
    window.addEventListener('unhandledrejection', function(event){
      var app=document.getElementById('app');
      if(!app) return;
      var reason=event && event.reason ? (event.reason.stack || event.reason.message || event.reason) : 'Promesse rejetée';
      app.innerHTML='<div class="container"><div class="card boot-error"><h1>Démarrage interrompu</h1><pre>'+String(reason).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];})+'</pre></div></div>';
    });
  </script>
