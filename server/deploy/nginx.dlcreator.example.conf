server {
  listen 80;
  server_name dlcreator.example.local;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name dlcreator.example.local;

  ssl_certificate     /etc/letsencrypt/live/dlcreator.example.local/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/dlcreator.example.local/privkey.pem;

  client_max_body_size 60m;
  access_log /var/log/nginx/dlcreator.access.log;
  error_log  /var/log/nginx/dlcreator.error.log warn;

  location /api/ {
    proxy_pass http://127.0.0.1:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location / {
    root /var/www/dl-creator-web;
    try_files $uri $uri/ /index.html;
  }
}
